depth_vision_avoidance:
  ros__parameters:
    # Topic parameters
    cmd_vel_topic: '/cmd_vel'
    camera_depth_topic: '/camera/depth/image_raw_decompressed'
    scan_topic: '/scan'

    # QoS settings
    qos_reliability: false

    # Control parameters
    start: false
    stop_distance: 0.7
    fov_deg: 60.0
    height_filter: -0.1
    speed: 0.1
    speed_up: 0.03
    twist_z: 0.06
    version: 2

    # Distance thresholds
    min_valid_distance_lidar: 0.25
    min_valid_distance_vision: 0.6
    movement_threshold: 2.0

    # LIDAR sector parameters (for version 2)
    lidar_min_measure_distance: 0.05
    lidar_sector_left_min: -170.0
    lidar_sector_left_max: -150.0
    lidar_sector_center_min1: -180.0
    lidar_sector_center_max1: -170.0
    lidar_sector_center_min2: 170.0
    lidar_sector_center_max2: 180.0
    lidar_sector_right_min: 150.0
    lidar_sector_right_max: 170.0